<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MmB Over the Board Championship</title>
<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-pale: #f7e8b0;
    --dark: #0d0a05;
    --dark2: #1a1208;
    --dark3: #231910;
    --cream: #f5eedc;
    --cream2: #e8d8b0;
    --red: #8b1a1a;
    --parchment: #d4b483;
    --parchment2: #c09a5a;
    --shadow: 0 8px 40px rgba(0,0,0,0.8);
    --glow: 0 0 30px rgba(201,168,76,0.35);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'Cinzel', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HERO HEADER ── */
  .hero {
    position: relative;
    width: 100%;
    min-height: 340px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: var(--hero-bg);
    background-size: cover;
    background-position: center top;
    filter: brightness(0.88) contrast(1.05);
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom,
      rgba(13,10,5,0) 0%,
      rgba(13,10,5,0.15) 50%,
      rgba(13,10,5,0.92) 100%
    );
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 20px 28px;
    width: 100%;
  }

  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(139,26,26,0.7);
    border: 1px solid rgba(220,60,60,0.6);
    border-radius: 30px;
    padding: 5px 16px;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    color: #ff8888;
    font-weight: 700;
    backdrop-filter: blur(4px);
  }

  .live-dot {
    width: 8px;
    height: 8px;
    background: #ff4444;
    border-radius: 50%;
    animation: livePulse 1.2s ease-in-out infinite;
  }

  @keyframes livePulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.7); }
  }

  /* ── PAGE WRAP ── */
  .page-wrap {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    text-align: center;
    font-size: 0.68rem;
    letter-spacing: 0.28em;
    color: var(--gold);
    text-transform: uppercase;
    margin: 32px 0 20px;
    opacity: 0.85;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .section-label::before,
  .section-label::after {
    content: '';
    flex: 1;
    max-width: 140px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }
  .section-label::after { background: linear-gradient(90deg, var(--gold), transparent); }

  /* ── PODIUM ── */
  .podium-row {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  .podium-card {
    background: linear-gradient(160deg, #2a1d0a, var(--dark2));
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 14px;
    padding: 18px 14px 14px;
    text-align: center;
    min-width: 125px;
    position: relative;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .podium-card:hover { transform: translateY(-4px); box-shadow: var(--glow); }
  .podium-card.rank-1 {
    border-color: rgba(201,168,76,0.65);
    box-shadow: 0 0 28px rgba(201,168,76,0.18);
    min-width: 148px;
    transform: translateY(-10px);
    background: linear-gradient(160deg, #332208, var(--dark2));
  }
  .podium-card.rank-2 { border-color: rgba(180,180,180,0.35); }
  .podium-card.rank-3 { border-color: rgba(180,100,40,0.35); }
  .podium-medal { font-size: 1.6rem; display: block; margin-bottom: 6px; }
  .podium-photo {
    width: 68px; height: 68px; border-radius: 50%;
    object-fit: cover; border: 3px solid var(--gold);
    margin: 0 auto 8px; display: block; background: var(--dark3);
  }
  .podium-card.rank-1 .podium-photo { width: 80px; height: 80px; }
  .podium-name {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.06em;
    color: var(--cream); margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px;
    margin-left: auto; margin-right: auto;
  }
  .podium-pts {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.4rem; font-weight: 900;
    color: var(--gold-light);
    text-shadow: 0 0 18px rgba(201,168,76,0.55);
  }
  .podium-card.rank-1 .podium-pts { font-size: 1.8rem; }

  /* ── PLAYERS GRID ── */
  .players-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 16px;
  }

  .player-card {
    background: linear-gradient(145deg, #201508, #160f05);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 16px;
    padding: 20px 18px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    overflow: hidden;
    transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    animation: fadeInUp 0.5s ease both;
  }
  .player-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.06) 0%, transparent 55%);
    pointer-events: none;
  }
  .player-card:hover {
    transform: translateY(-3px);
    border-color: rgba(201,168,76,0.5);
    box-shadow: 0 14px 40px rgba(0,0,0,0.5), var(--glow);
  }
  .player-card:nth-child(1) { animation-delay: 0.04s; }
  .player-card:nth-child(2) { animation-delay: 0.08s; }
  .player-card:nth-child(3) { animation-delay: 0.12s; }
  .player-card:nth-child(4) { animation-delay: 0.16s; }
  .player-card:nth-child(5) { animation-delay: 0.20s; }
  .player-card:nth-child(6) { animation-delay: 0.24s; }
  .player-card:nth-child(7) { animation-delay: 0.28s; }
  .player-card:nth-child(8) { animation-delay: 0.32s; }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .player-rank-badge {
    position: absolute; top: 11px; right: 13px;
    font-size: 0.6rem; color: var(--gold); opacity: 0.55;
    letter-spacing: 0.1em; font-weight: 700;
  }

  .player-photo-wrap { position: relative; flex-shrink: 0; }
  .player-photo {
    width: 70px; height: 70px; border-radius: 50%;
    object-fit: cover; border: 3px solid rgba(201,168,76,0.5);
    background: var(--dark3); display: block;
    transition: border-color 0.3s;
  }
  .player-card:hover .player-photo { border-color: var(--gold); }
  .photo-upload-hint {
    position: absolute; inset: 0; border-radius: 50%;
    background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s; cursor: pointer; font-size: 1.1rem;
  }
  .player-photo-wrap:hover .photo-upload-hint { opacity: 1; }
  input[type="file"] { display: none; }

  .player-info { flex: 1; min-width: 0; }
  .player-name {
    font-size: 0.82rem; font-weight: 700; letter-spacing: 0.06em;
    color: var(--cream); margin-bottom: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    outline: none; cursor: text;
    border-bottom: 1px dashed transparent;
    transition: border-color 0.2s;
  }
  .player-name:focus { border-bottom-color: var(--gold); }
  .player-title-tag {
    font-family: 'EB Garamond', serif; font-size: 0.76rem;
    color: var(--gold); opacity: 0.7; font-style: italic; margin-bottom: 10px;
  }
  .score-display {
    font-family: 'Cinzel Decorative', serif;
    font-size: 2rem; font-weight: 900;
    color: var(--gold-light);
    text-shadow: 0 0 18px rgba(201,168,76,0.45);
    line-height: 1;
    transition: transform 0.15s;
  }
  .score-display.flash {
    animation: scoreFlash 0.45s ease;
  }
  @keyframes scoreFlash {
    0%   { transform: scale(1); color: var(--gold-light); }
    40%  { transform: scale(1.25); color: #fff7a0; text-shadow: 0 0 28px rgba(255,247,160,0.9); }
    100% { transform: scale(1); color: var(--gold-light); }
  }
  .score-label {
    font-size: 0.52rem; letter-spacing: 0.22em;
    color: var(--gold); opacity: 0.45; margin-top: 1px;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
  }
  .btn-row { display: flex; gap: 3px; }

  .btn {
    width: 36px; height: 32px; border-radius: 7px;
    border: none; cursor: pointer;
    font-size: 0.72rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.13s, box-shadow 0.13s, background 0.13s;
    font-family: 'Cinzel', serif;
  }
  .btn:active { transform: scale(0.88); }

  .btn-1 { background: linear-gradient(145deg, #1f5010, #123208); color: #90ff90; border: 1px solid rgba(100,255,100,0.25); }
  .btn-2 { background: linear-gradient(145deg, #285512, #163508); color: #b0ffb0; border: 1px solid rgba(120,255,120,0.25); }
  .btn-3 { background: linear-gradient(145deg, #2e5914, #1a3a09); color: #ccffcc; border: 1px solid rgba(140,255,140,0.25); }
  .btn-4 { background: linear-gradient(145deg, #3a6018, #20400a); color: #e0ffe0; border: 1px solid rgba(160,255,160,0.25); }
  .btn-5 { background: linear-gradient(145deg, #3f6518, #22450b); color: #f0fff0; border: 1px solid rgba(180,255,180,0.25); }
  .btn-1:hover { background: linear-gradient(145deg, #286818, #1f5010); box-shadow: 0 0 12px rgba(100,255,100,0.3); }
  .btn-2:hover { background: linear-gradient(145deg, #336e1e, #285512); box-shadow: 0 0 12px rgba(120,255,120,0.3); }
  .btn-3:hover { background: linear-gradient(145deg, #3a741e, #2e5914); box-shadow: 0 0 12px rgba(140,255,140,0.3); }
  .btn-4:hover { background: linear-gradient(145deg, #457820, #3a6018); box-shadow: 0 0 12px rgba(160,255,160,0.3); }
  .btn-5:hover { background: linear-gradient(145deg, #4a7d22, #3f6518); box-shadow: 0 0 12px rgba(180,255,180,0.3); }

  .btn-minus {
    background: linear-gradient(145deg, #5a1515, #3a0a0a); color: #ff9898;
    border: 1px solid rgba(255,80,80,0.25);
    width: 100%;
  }
  .btn-minus:hover { background: linear-gradient(145deg, #7a2222, #5a1515); box-shadow: 0 0 12px rgba(255,80,80,0.3); }
  .btn-reset-sm {
    background: linear-gradient(145deg, #2e1e08, #1e1205); color: var(--gold);
    border: 1px solid rgba(201,168,76,0.2); width: 100%; font-size: 0.6rem;
  }
  .btn-reset-sm:hover { background: linear-gradient(145deg, #4a2e10, #2e1e08); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: linear-gradient(145deg, #261c08, var(--dark3));
    border: 1px solid var(--gold);
    border-radius: 30px; padding: 11px 28px;
    font-size: 0.78rem; letter-spacing: 0.1em;
    color: var(--gold-light); z-index: 999;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s;
    opacity: 0; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── FOOTER ── */
  footer {
    text-align: center; margin-top: 48px;
    padding-top: 22px;
    border-top: 1px solid rgba(201,168,76,0.12);
  }
  .footer-chess { font-size: 1.3rem; letter-spacing: 0.4em; color: var(--gold); opacity: 0.25; }
  .footer-text {
    font-family: 'EB Garamond', serif; font-style: italic;
    font-size: 0.78rem; color: var(--cream2); opacity: 0.35; margin-top: 6px;
  }

  @media (max-width: 600px) {
    .players-grid { grid-template-columns: 1fr; }
    .podium-row { gap: 8px; }
  }
</style>
</head>
<body>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bgMusic");
let isPlaying = false;

// first click starts music
document.addEventListener("click", function () {
  if (!isPlaying) {
    music.play();
    isPlaying = true;
  }
});

// double click toggles play/pause
document.addEventListener("dblclick", function () {
  if (isPlaying) {
    music.pause();
    isPlaying = false;
  } else {
    music.play();
    isPlaying = true;
  }
});
</script>
  
<!-- HERO -->
<div class="hero" id="heroSection">
  <div class="hero-bg" id="heroBg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="live-badge"><span class="live-dot"></span> LIVE SCOREBOARD</div>
  </div>
</div>

<div class="page-wrap">

  <!-- PODIUM -->
  <div class="section-label">⚔ Current Standings ⚔</div>
  <div class="podium-row" id="podiumRow"></div>

  <!-- GRID -->
  <div class="section-label">♟ All Players ♟</div>
  <div class="players-grid" id="playersGrid"></div>

</div>

<!-- FOOTER -->
<footer>
  <div class="footer-chess">♔ ♕ ♖ ♗ ♘ ♙</div>
  <div class="footer-text">MmB Over the Board Championship — Live Scoreboard</div>
</footer>

<!-- TOAST -->
<div class="toast" id="toast"></div>

// ── DATA ──
const PLAYERS = [
  { id:1, name:"Player One",       title:"Sayem",          photo:"sayem.jpg" },
  { id:2, name:"Player Two",          title:"Shahadat",  photo:"Shahadat.jpeg" },
  { id:3, name:"Player Three",   title:"Sahil",           photo:"sahil.jpg" },
  { id:4, name:"Player Four",         title:"Faisal",      photo:"Faisal.jpg" },
  { id:5, name:"Player Five",   title:"Hasib",      photo:"hasib.jpg" },
  { id:6, name:"Player Six",    title:"Seam",         photo:"Seam.jpg" },
  { id:7, name:"Player Seven",  title:"Inan",         photo:"Inan.jpg" },
  { id:8, name:"Player Eight",  title:"Meraj",          photo:"Meraj.jpg" },
];

const STORAGE_KEY = "mmb_scores_v2";
const PHOTO_KEY   = "mmb_photos_v2";
const NAMES_KEY   = "mmb_names_v2";

let scores = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
let photos = JSON.parse(localStorage.getItem(PHOTO_KEY)   || "{}");
let names  = JSON.parse(localStorage.getItem(NAMES_KEY)   || "{}");

PLAYERS.forEach(p => {
  if (scores[p.id] === undefined) scores[p.id] = 0;
  if (names[p.id])  p.name  = names[p.id];
  if (photos[p.id]) p.photo = photos[p.id];
});

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(scores));
  localStorage.setItem(PHOTO_KEY,   JSON.stringify(photos));
  localStorage.setItem(NAMES_KEY,   JSON.stringify(names));
}

function getRanked() {
  return [...PLAYERS].sort((a,b) => scores[b.id] - scores[a.id]);
}

function avatarSvg(name) {
  const init = name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  return `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='70' height='70'><rect width='70' height='70' rx='35' fill='%23231910'/><text x='35' y='46' text-anchor='middle' font-family='serif' font-size='22' fill='%23c9a84c' font-weight='700'>${encodeURIComponent(init)}</text></svg>`;
}

function photoSrc(p) { return p.photo || avatarSvg(p.name); }
function fmt(s) { return Number.isInteger(s) ? s.toString() : s.toFixed(1); }

// ── PODIUM ──
function renderPodium() {
  const ranked = getRanked();
  const order  = [ranked[1], ranked[0], ranked[2]];
  const medals = ["🥈","🥇","🥉"];
  const cls    = ["rank-2","rank-1","rank-3"];
  document.getElementById("podiumRow").innerHTML =
    order.map((p,i) => !p ? "" : `
      <div class="podium-card ${cls[i]}">
        <span class="podium-medal">${medals[i]}</span>
        <img class="podium-photo" src="${photoSrc(p)}" alt="${p.name}">
        <div class="podium-name">${p.name}</div>
        <div class="podium-pts">${fmt(scores[p.id])}</div>
      </div>`).join("");
}

// ── GRID ──
function renderGrid() {
  const ranked = getRanked();
  document.getElementById("playersGrid").innerHTML = ranked.map((p,i) => `
    <div class="player-card" id="card-${p.id}">
      <div class="player-rank-badge">#${i+1}</div>
      <div class="player-photo-wrap">
        <img class="player-photo" id="photo-${p.id}" src="${photoSrc(p)}" alt="${p.name}">
        <label class="photo-upload-hint" for="file-${p.id}" title="Upload photo">📷</label>
        <input type="file" id="file-${p.id}" accept="image/*" onchange="uploadPhoto(${p.id},this)">
      </div>
      <div class="player-info">
        <div class="player-name" id="name-${p.id}" contenteditable="true" spellcheck="false"
             onblur="saveName(${p.id},this)">${p.name}</div>
        <div class="player-title-tag">${p.title}</div>
        <div class="score-display" id="score-${p.id}">${fmt(scores[p.id])}</div>
        <div class="score-label">POINTS</div>
      </div>
      <div class="controls">
        <div class="btn-row">
          <button class="btn btn-1" onclick="addScore(${p.id},1)"  title="+1">+1</button>
          <button class="btn btn-2" onclick="addScore(${p.id},2)"  title="+2">+2</button>
          <button class="btn btn-3" onclick="addScore(${p.id},3)"  title="+3">+3</button>
        </div>
        <div class="btn-row">
          <button class="btn btn-4" onclick="addScore(${p.id},4)"  title="+4">+4</button>
          <button class="btn btn-5" onclick="addScore(${p.id},5)"  title="+5">+5</button>
        </div>
        <button class="btn btn-minus" onclick="addScore(${p.id},-1)" title="-1 point">− 1</button>
        <button class="btn btn-reset-sm" onclick="resetPlayer(${p.id})" title="Reset">↺ Reset</button>
      </div>
    </div>`).join("");
}

// ── ACTIONS ──
function addScore(id, delta) {
  scores[id] = Math.max(0, (scores[id]||0) + delta);
  save();
  flashScore(id);
  renderPodium();
  renderGrid();
}

function flashScore(id) {
  const el = document.getElementById(`score-${id}`);
  if (!el) return;
  el.textContent = fmt(scores[id]);
  el.classList.remove("flash");
  void el.offsetWidth;
  el.classList.add("flash");
}

function resetPlayer(id) {
  scores[id] = 0;
  save();
  renderPodium();
  renderGrid();
  showToast("Score reset ↺");
}

function saveName(id, el) {
  const n = el.textContent.trim();
  if (!n) return;
  names[id] = n;
  PLAYERS.find(p=>p.id===id).name = n;
  save();
  renderPodium();
}

function uploadPhoto(id, input) {
  const file = input.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    photos[id] = e.target.result;
    PLAYERS.find(p=>p.id===id).photo = e.target.result;
    save();
    const img = document.getElementById(`photo-${id}`);
    if (img) img.src = e.target.result;
    renderPodium();
    showToast("Photo updated ✓");
  };
  r.readAsDataURL(file);
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2400);
}

renderPodium();
renderGrid();
</script>
